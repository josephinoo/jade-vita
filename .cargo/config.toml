[build]
target = "armv7-sony-vita-newlibeabihf"

[env]
CMAKE_POLICY_VERSION_MINIMUM = "3.5"
AR_armv7_sony_vita_newlibeabihf = { value = "tools/vita-ar", relative = true }
CC_armv7_sony_vita_newlibeabihf = { value = "tools/vita-gcc", relative = true }
PKG_CONFIG_ALLOW_CROSS_armv7_sony_vita_newlibeabihf = "1"
PKG_CONFIG_armv7_sony_vita_newlibeabihf = { value = "tools/vita-pkg-config", relative = true }

[target.armv7-sony-vita-newlibeabihf]
linker = "tools/vita-gcc"
# See green-vita's own config for the original discovery of this issue: `simd-adler32`
# (pulled in by the `png` feature of `image`, used here for icon/screenshot assets) picks a
# NEON-accelerated path on this target that is still unstable for this toolchain and fails to
# build. Disabling the NEON target feature falls back to its portable scalar implementation.
# NOTE: `cargo-vita`'s own build wrapper does not forward this setting through to rustc (plain
# `cargo build --target armv7-sony-vita-newlibeabihf` does honor it) - when building via
# `cargo vita build`, export RUSTFLAGS="-C target-feature=-neon" in the shell instead (the
# Makefile in this repo already does this).
rustflags = ["-C", "target-feature=-neon"]
